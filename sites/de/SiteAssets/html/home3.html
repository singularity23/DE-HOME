<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <style>
    .sr-only {
      position: absolute !important;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .skip-link {
      position: absolute;
      left: 12px;
      top: 12px;
      padding: 10px 12px;
      background: #fff;
      color: #171717;
      border: 1px solid #E5E5E5;
      border-radius: 10px;
      z-index: 9999;
      transform: translateY(-160%);
      transition: transform 180ms ease-out;
    }

    .skip-link:focus {
      transform: translateY(0);
      outline: 3px solid rgba(23, 23, 23, 0.35);
      outline-offset: 2px;
    }
  </style>
  <script src="/sites/de/SiteAssets/js/default.js"></script>

    gtag('js', new Date());

    gtag('config', 'G-MYQM69XE6F');
