    @font-face {

    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, 'Lucida Grande', Helvetica, 'Heiti SC', 'microsoft yahei', Verdana, sans-serif;
      font-size: 13px;
      letter-spacing: 0.0446em;
      line-height: 1.628em;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;

    }

    body {
      background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 10px;
      padding: 20px 0;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      font-size: 1.25rem;
      color: #64748b;
      margin-bottom: 30px;
    }

    .search-container {
      max-width: 500px;
      margin: 0 auto 40px;
      position: relative;
      transform: translateY(50%)
    }

    .search-input {
      width: 100%;
      padding: 16px 20px 16px 50px;
      border-radius: 12px;
      border: 2px solid #e2e8f0;
      font-size: 1rem;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
    }

    .search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 1.2rem;
    }

    .links.panel {
      margin-bottom: 20px;
      padding: 1px;
      border-radius: 8px;
      background: var(--card-bg);
      box-shadow: var(--shadow);
    }

    .links.panel:hover {
      box-shadow: var(--hover-shadow);
    }

    .panel-heading {
      padding: 15px 30px;
      font-size: 18px;
      font-family: 'brand-font-bold';
      border-bottom: 2px groove var(--secondary-color);
      border-radius: 4px 4px 0 0;
      color: var(--text-color);
      font-variant: small-caps;
      text-transform: uppercase;
      line-height: 1.6em;
    }

    .panel-body {
      padding: 10px;
    }

    .links dl {
      border-bottom: 1px inset var(--secondary-color);
      padding: 10px 0;
    }

    .links dl:last-child {
      border: 0;
      padding-bottom: 0;
    }

    .links dt a {
      display: inline-block;
      margin: 10px;
      color: var(--box-text-sub);
      font-size: 15px;
      cursor: default;
      font-family: 'brand-font-medium';
      text-decoration: none;
      text-wrap: pretty;
      height: 7rem;
      line-height: 1.372em;
    }

    .links dd,
    .links dt {
      min-width: 180px;
      max-width: 220px;
      padding: 10px;
      position: relative;
    }

    .links dd a {
      display: block;
      padding: 10px;
      min-height: 7rem;
      transition: all 0.3s ease;
      width: 100%;
      background-color: 0;
      border-radius: 4px;
    }

    .links dd a:hover {
      background-color: var(--secondary-color);
    }

    a {
      text-decoration: none;
      color: var(--link-color);
      font-weight: 500;
    }

    a:hover {
      color: var(--link-highlight-color);
    }

    .links dd .link-title {
      position: relative;
      padding-bottom: 2px;
      overflow: hidden;
      display: block;
      line-height: 1.4em;
      text-wrap: pretty;
    }

    .link-info {
      display: block;
      font-size: 12px;
      color: var(--box-text-sub);
      line-height: 1.3em;
      text-wrap: pretty;
    }

    .link-info:hover {
      text-decoration: none;
    }

    .links dd .sub-link {
      bottom: 2px;
      left: 20px;
      font-size: 12px;
      color: var(--box-text-sublink);
      line-height: 1.5em;
    }

    .links dd .sub-link a {
      font-size: 12px;
      color: #999;
      border-bottom-width: 1px;
      padding-bottom: 2px;
      border-bottom-style: dotted;
      border-color: inherit;
      display: inline;
      padding: 0;
    }

    footer {
      text-align: center;
      margin-top: 50px;
      padding: 20px;
      color: #64748b;
      font-size: 0.9rem;
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background-color: white;
      padding: 30px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      border-radius: 8px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #e2e8f0;
    }

    .modal-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary-color);
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #64748b;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #334155;
    }

    .form-input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 4px;
      font-size: 1rem;
      transition: border-color 0.3s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary-color);
    }

    .color-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .color-option {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.2s ease;
    }

    .color-option:hover {
      transform: scale(1.1);
    }

    .color-option.selected {
      border-color: #333;
      transform: scale(1.1);
    }

    .submit-btn {
      background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }

    .add-category-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
      color: white;
      border: none;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 1.5rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .add-category-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      /* 5 columns */
      gap: 10px;
      width: 100%;
      max-width: 1200px;
      margin: auto;
    }

    .item {
      display: flex;
      /*transition: all 0.3s ease;*/
    }

    /* The first element (special one) */
    .special {
      grid-row: span 1;
      height: auto;
      /* auto-height, controlled by JS dynamically */
    }

    /* Responsive design */

    @media (max-width: 1024px) {
      .grid-container {
        grid-template-columns: repeat(4, 1fr);
      }

      .links dd {
        min-width: 160px;
        max-width: 180px;
      }
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2.2rem;
      }

      .grid-container {
        grid-template-columns: repeat(3, 1fr);
      }

      .add-category-btn {
        bottom: 20px;
        right: 20px;
        width: 50px;
        height: 50px;
        font-size: 1.3rem;
      }
    }

    @media (max-width: 500px) {
      body {
        padding: 10px;
      }

      .search-container {
        margin-bottom: 30px;
      }

      .grid-container {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

    function renderCategories(categoriesToRender) {
      const container = document.getElementById('categoriesContainer');
      container.innerHTML = '';

      categoriesToRender.forEach((category, categoryIndex) => {
        const panel = document.createElement('div');
        panel.className = 'links panel';

        const heading = document.createElement('div');
        heading.className = 'panel-heading';
        heading.textContent = category.name;
        panel.appendChild(heading);

        const body = document.createElement('div');
        body.className = 'panel-body';

        category.subheaders.forEach((subheader, subheaderIndex) => {
          const dl = document.createElement('dl');
          dl.className = 'grid-container';
          if (subheader.title) {
            const dt = document.createElement('dt');
            dt.className = 'special';
            const dtLink = document.createElement('a');
            dtLink.href = '#nogo';
            dtLink.target = '_blank';
            dtLink.textContent = subheader.title;
            dt.appendChild(dtLink);
            dl.appendChild(dt);
          }

          subheader.links.forEach((link, linkIndex) => {
            const dd = document.createElement('dd');
            dd.className = 'item';
            const linkEl = document.createElement('a');
            linkEl.href = link.url;
            linkEl.target = '_blank';
            linkEl.innerHTML = `<span class="link-title">${link.name}</span><span class="link-info">${link.info}</span>`;

            linkEl.dataset.categoryIndex = categoryIndex;
            linkEl.dataset.subheaderIndex = subheaderIndex;
            linkEl.dataset.linkIndex = linkIndex;
            linkEl.draggable = true;

            dd.appendChild(linkEl);
            dl.appendChild(dd);

            if (link.sub_links) {
              const sublinkContainer = document.createElement('span');
              sublinkContainer.className = 'sub-link';
              link.sub_links.forEach(sub_link => {
                const sublinkEl = document.createElement('span');
                sublinkEl.innerHTML = `| <a href="${sub_link.url}" target="_blank">${sub_link.name}</a> `;
                sublinkContainer.appendChild(sublinkEl);
              });
              linkEl.appendChild(sublinkContainer);
            }
          });
          body.appendChild(dl);
        });

        panel.appendChild(body);
        container.appendChild(panel);
      });

      initDragAndDrop();
    }

    renderCategories(categories);

    document.getElementById('searchInput').addEventListener('input', function (e) {
      const searchTerm = e.target.value.toLowerCase().trim();

      // If search is empty, show all categories
      if (!searchTerm) {
        return renderCategories(categories);
      }

      // Filter categories based on search term
      const filteredCategories = categories
        .map(category => {
          // Check if category name matches search
          const categoryMatches = category.name.toLowerCase().includes(searchTerm);

          // Filter subheaders
          const filteredSubheaders = category.subheaders
            .map(subheader => {
              // Check if subheader title matches search
              const subheaderMatches = subheader.title?.toLowerCase().includes(searchTerm);

              // Filter links
              const filteredLinks = subheader.links.filter(
                link => link.name.toLowerCase().includes(searchTerm) || subheaderMatches || categoryMatches
              );

              return {
                ...subheader,
                links: filteredLinks,
              };
            })
            .filter(
              subheader =>
                subheader.links.length > 0 || subheader.title?.toLowerCase().includes(searchTerm) || categoryMatches
            );

          return {
            ...category,
            subheaders: filteredSubheaders,
          };
        })
        .filter(category => category.subheaders.length > 0);

      renderCategories(filteredCategories);
    });


    function resize() {
      const containers = document.querySelectorAll('.grid-container');

      containers.forEach(container => {
        const firstItem = container.querySelector('.special');
        if (firstItem) {
          containerWidth = container.clientWidth;
          itemWidth = firstItem.clientWidth;
          const actualTotal = Math.round(containerWidth / itemWidth) - 1;
          console.log(containerWidth);
          console.log(itemWidth);
          console.log(actualTotal);
          function adjustFirstItemSpan() {
            const items = container.querySelectorAll('.item');
            const total = items.length;
            console.log(total);
            // Number of rows = ceil(total / 5)
            rows = Math.ceil(total / actualTotal);
            console.log(rows);

            // First item spans N rows if >1
            firstItem.style.gridRow = `span ${rows > 1 ? rows : 1}`;

            // Set first item height dynamically (optional)
            const singleHeight = 7; // matches CSS
            firstItem.style.height = `${rows * singleHeight}rm + ${rows * 10}px`; // include gap
          }

          // Run initially
          adjustFirstItemSpan();

          // Optional: auto-adjust when items are added or removed
          const observer = new MutationObserver(adjustFirstItemSpan);
          observer.observe(container, { childList: true });
        }
      });
    }

    document.addEventListener('DOMContentLoaded', resize);
    window.addEventListener('resize', resize);
  </script>
