<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Signature Form Demo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/signature_pad/1.5.3/signature_pad.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .content {
      padding: 40px;
    }

    .form-section {
      margin-bottom: 40px;
    }

    .section-title {
      font-size: 1.5em;
      color: #333;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 3px solid #667eea;
    }

    .form {
      margin-bottom: 20px;
    }

    .form label {
      display: block;
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
    }

    .form input,
    .form textarea,
    .form select {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 1em;
      transition: border-color 0.3s;
    }

    .form input:focus,
    .form textarea:focus,
    .form select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form textarea {
      resize: vertical;
      min-height: 100px;
    }

    /* Signature Pad Styling */
    .signature-container {
      border: 2px dashed #667eea;
      border-radius: 8px;
      padding: 15px;
      background: #f8f9ff;
    }

    #signaturePad {
      border: 2px solid #ddd;
      border-radius: 6px;
      cursor: crosshair;
      display: block;
      margin: 15px 0;
      background: white;
      width: 100%;
      height: 200px;
    }

    .signature-buttons {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .signature-buttons button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-clear {
      background: #ff6b6b;
      color: white;
    }

    .btn-clear:hover {
      background: #ee5a52;
      transform: translateY(-2px);
    }

    .signature-info {
      background: #e3f2fd;
      border-left: 4px solid #2196F3;
      padding: 12px;
      border-radius: 4px;
      margin-top: 12px;
      font-size: 0.95em;
      color: #1565c0;
    }

    /* Document Preview */
    .document-preview {
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
      max-height: 400px;
      overflow-y: auto;
    }

    .document-preview h3 {
      color: #333;
      margin-bottom: 15px;
    }

    .document-item {
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-left: 4px solid #667eea;
      border-radius: 4px;
    }

    .document-item label {
      font-weight: 600;
      color: #667eea;
      font-size: 0.9em;
      margin-bottom: 5px;
    }

    .document-item p {
      color: #666;
      margin: 0;
    }

    /* Buttons */
    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 30px;
    }

    button {
      padding: 14px 24px;
      font-size: 1em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      grid-column: span 2;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .status-message {
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }

    .status-message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .status-message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 768px) {
      .row {
        grid-template-columns: 1fr;
      }

      .button-group {
        grid-template-columns: 1fr;
      }

      .btn-primary {
        grid-column: span 1;
      }

      .header h1 {
        font-size: 1.8em;
      }
    }

    .timestamp {
      font-size: 0.85em;
      color: #999;
      margin-top: 5px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>📋 Digital Signature Form</h1>
      <p>Interactive Demo - Sign and Generate PDF</p>
    </div>

    <div class="content">
      <div id="statusMessage" class="status-message"></div>

      <form id="signatureForm">
        <!-- Document Information Section -->
        <div class="form-section">
          <h2 class="section-title">Document Information</h2>

          <div class="row">
            <div class="form">
              <label for="docTitle">Document Title *</label>
              <input type="text" id="docTitle" placeholder="e.g., Service Agreement" required>
            </div>
            <div class="form">
              <label for="docNumber">Document Number</label>
              <input type="text" id="docNumber" placeholder="e.g., DOC-2026-001">
            </div>
          </div>

          <div class="form">
            <label for="docContent">Document Content</label>
            <textarea id="docContent" placeholder="Enter the main content of your document here...">Terms and Conditions:

1. The parties agree to the terms outlined herein.
2. This document is legally binding upon execution.
3. Signatures below indicate acceptance of these terms.</textarea>
          </div>
        </div>

        <!-- Signatory Information Section -->
        <div class="form-section">
          <h2 class="section-title">Signatory Information</h2>

          <div class="row">
            <div class="form">
              <label for="fullName">Full Name *</label>
              <input type="text" id="fullName" placeholder="Enter your full name" required>
            </div>
            <div class="form">
              <label for="email">Email Address *</label>
              <input type="email" id="email" placeholder="your.email@example.com" required>
            </div>
          </div>

          <div class="row">
            <div class="form">
              <label for="jobTitle">Job Title</label>
              <input type="text" id="jobTitle" placeholder="e.g., Manager, Engineer">
            </div>
            <div class="form">
              <label for="department">Department</label>
              <input type="text" id="department" placeholder="e.g., Engineering">
            </div>
          </div>

          <div class="form">
            <label for="company">Company/Organization</label>
            <input type="text" id="company" placeholder="Enter organization name">
          </div>
        </div>

        <!-- Digital Signature Section -->
        <div class="form-section">
          <h2 class="section-title">Digital Signature</h2>

          <div class="signature-container">
            <p style="color: #666; margin-bottom: 10px;">
              <strong>Sign here:</strong> Draw your signature in the box below. Use your mouse or touch device.
            </p>
            <canvas id="signaturePad"></canvas>

            <div class="signature-buttons">
              <button type="button" class="btn-secondary btn-clear" onclick="clearSignature()">
                ✕ Clear Signature
              </button>
            </div>

            <div class="signature-info">
              ✓ <strong>Signature Status:</strong> <span id="signatureStatus">Not signed yet</span>
            </div>
          </div>
        </div>

        <!-- Document Preview -->
        <div class="form-section">
          <h2 class="section-title">Document Preview</h2>
          <div class="document-preview" id="previewContainer">
            <!-- Will be populated by JavaScript -->
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="button-group">
          <button type="button" class="btn-secondary" onclick="previewDocument()">
            👁️ Preview Document
          </button>
          <button type="button" class="btn-secondary" onclick="resetForm()">
            🔄 Reset Form
          </button>
          <button type="submit" class="btn-primary" id="submitBtn">
            📥 Download Signed PDF
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Hidden element for PDF generation -->
  <div id="pdfContent" style="display: none; background: white; padding: 30px; width: 8.5in; margin: auto;">
    <!-- PDF content will be generated here -->
  </div>

  <script>
    let signaturePad = null;

    // Initialize Signature Pad on page load
    window.addEventListener('load', function () {
      const canvas = document.getElementById('signaturePad');

      // Handle canvas resizing for different screen sizes
      function resizeCanvas () {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext('2d').scale(ratio, ratio);
        console.log(window.devicePixelRatio);
        console.log(canvas.offsetWidth, canvas.offsetHeight);
        console.log(canvas.width, canvas.height);
      }

      resizeCanvas();
      window.addEventListener('resize', resizeCanvas, { passive: true });

      signaturePad = new SignaturePad(canvas, {
        minWidth: 0.5,
        maxWidth: 2.5,
        throttle: 16,
        dotSize: 3,
        penColor: '#667eea'
      });

      // Update signature status
      canvas.addEventListener('mouseup', updateSignatureStatus, { passive: true });
      canvas.addEventListener('touchend', updateSignatureStatus, { passive: true });
    });

    function updateSignatureStatus () {
      const isEmpty = signaturePad.isEmpty();
      const statusEl = document.getElementById('signatureStatus');
      if (isEmpty) {
        statusEl.textContent = 'Not signed yet';
        statusEl.style.color = '#e74c3c';
      } else {
        const timestamp = new Date().toLocaleString();
        statusEl.innerHTML = `✓ Signed on ${timestamp}`;
        statusEl.style.color = '#27ae60';
      }
    }

    function clearSignature () {
      signaturePad.clear();
      updateSignatureStatus();
    }

    function showStatus (message, type) {
      const statusEl = document.getElementById('statusMessage');
      statusEl.textContent = message;
      statusEl.className = `status-message ${type}`;
      setTimeout(() => {
        statusEl.className = 'status-message';
      }, 4000);
    }

    function previewDocument () {
      const preview = document.getElementById('previewContainer');

      const docTitle = document.getElementById('docTitle').value || 'Document Title';
      const docNumber = document.getElementById('docNumber').value || 'N/A';
      const docContent = document.getElementById('docContent').value || '';
      const fullName = document.getElementById('fullName').value || '[Signature Required]';
      const email = document.getElementById('email').value || '';
      const jobTitle = document.getElementById('jobTitle').value || '';
      const company = document.getElementById('company').value || '';

      preview.innerHTML = `
                <h3>${docTitle}</h3>
                <div class="document-item">
                    <label>Document Number:</label>
                    <p>${docNumber}</p>
                </div>
                <div class="document-item">
                    <label>Content:</label>
                    <p>${docContent.replace(/\n/g, '<br>')}</p>
                </div>
                <hr style="margin: 20px 0; color: #ddd;">
                <div class="document-item">
                    <label>Signatory Name:</label>
                    <p>${fullName}</p>
                </div>
                <div class="document-item">
                    <label>Email:</label>
                    <p>${email || 'Not provided'}</p>
                </div>
                <div class="document-item">
                    <label>Job Title:</label>
                    <p>${jobTitle || 'Not provided'}</p>
                </div>
                <div class="document-item">
                    <label>Company:</label>
                    <p>${company || 'Not provided'}</p>
                </div>
            `;
    }

    function resetForm () {
      document.getElementById('signatureForm').reset();
      clearSignature();
      document.getElementById('previewContainer').innerHTML = '';
      document.getElementById('statusMessage').className = 'status-message';
    }

    // Main form submission handler
    document.getElementById('signatureForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      // Validation
      if (!document.getElementById('fullName').value) {
        console.log('Please enter your full name');
        showStatus('❌ Please enter your full name', 'error');
        return;
      }

      if (!document.getElementById('email').value) {
        showStatus('❌ Please enter your email address', 'error');
        return;
      }

      if (!document.getElementById('docTitle').value) {
        showStatus('❌ Please enter a document title', 'error');
        return;
      }

      if (signaturePad.isEmpty()) {
        showStatus('❌ Please sign the document before submitting', 'error');
        return;
      }

      try {
        showStatus('⏳ Generating PDF...', 'success');
        await generateSignedPDF();
        showStatus('✓ PDF downloaded successfully!', 'success');
      } catch (error) {
        console.error('Error:', error);
        showStatus('❌ Error generating PDF: ' + error.message, 'error');
      }
    });

    async function generateSignedPDF () {
      const docTitle = document.getElementById('docTitle').value;
      const docNumber = document.getElementById('docNumber').value;
      const docContent = document.getElementById('docContent').value;
      const fullName = document.getElementById('fullName').value;
      const email = document.getElementById('email').value;
      const jobTitle = document.getElementById('jobTitle').value;
      const company = document.getElementById('company').value;
      const department = document.getElementById('department').value;

      // Get signature as image
      const signatureData = signaturePad.toDataURL('image/png');
      const timestamp = new Date().toLocaleString();

      // Create PDF content
      const pdfElement = document.getElementById('pdfContent');
      pdfElement.innerHTML = `
                <div style="font-family: Arial, sans-serif;">
                    <h1 style="text-align: center; color: #333; margin-bottom: 30px;">
                        ${docTitle}
                    </h1>
                    
                    <div style="background: #f5f5f5; padding: 20px; margin-bottom: 30px; border-radius: 8px;">
                        <p><strong>Document Number:</strong> ${docNumber || 'N/A'}</p>
                        <p><strong>Generated Date:</strong> ${new Date().toLocaleDateString()}</p>
                    </div>

                    <div style="margin-bottom: 30px; line-height: 1.6;">
                        <h3 style="color: #333; margin-bottom: 10px;">Document Content:</h3>
                        <p style="white-space: pre-wrap; color: #666;">
                            ${docContent}
                        </p>
                    </div>

                    <hr style="margin: 40px 0; border: none; border-top: 2px solid #ddd;">

                    <div style="margin-top: 40px;">
                        <h3 style="color: #333; margin-bottom: 20px;">Digital Signature:</h3>
                        
                        <div style="float: left; width: 50%; padding-right: 20px;">
                            <img src="${signatureData}" style="height: 150px; border: 1px solid #ddd; padding: 10px; background: white;">
                            <p style="margin-top: 10px; font-size: 12px; color: #666;">
                                <strong>Signatory:</strong> ${fullName}<br>
                                <strong>Email:</strong> ${email}<br>
                                <strong>Job Title:</strong> ${jobTitle || 'N/A'}<br>
                                <strong>Department:</strong> ${department || 'N/A'}<br>
                                <strong>Company:</strong> ${company || 'N/A'}<br>
                                <strong>Signed Date:</strong> ${timestamp}
                            </p>
                        </div>
                        
                        <div style="clear: both;"></div>
                    </div>

                    <div style="margin-top: 80px; padding-top: 20px; border-top: 1px solid #ddd; font-size: 12px; color: #999; text-align: center;">
                        <p>
                            This document has been electronically signed. This signature has the same legal effect as a handwritten signature.<br>
                            Verification Code: ${generateVerificationCode()}<br>
                            Generated at: ${timestamp}
                        </p>
                    </div>
                </div>
            `;

      // Generate PDF using html2pdf
      const element = pdfElement;
      const opt = {
        margin: 10,
        filename: `${docTitle.replace(/\s+/g, '_')}_signed_${new Date().getTime()}.pdf`,
        image: { type: 'png', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      await html2pdf().set(opt).from(element).save();
    }

    function generateVerificationCode () {
      return 'VS' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).substr(2, 9).toUpperCase();
    }
  </script>
</body>

</html>
