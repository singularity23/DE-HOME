        const deptColors = {
            'Distribution Engineering': 'var(--color-primary)',
            'Civil Engineering': 'var(--color-civil)',
            'VI Regional': 'var(--color-regional)',
            'INT Regional': 'var(--color-regional)',
            'LMN Regional': 'var(--color-regional)',
            'LMS Regional': 'var(--color-regional)',
            'Projects A': 'var(--color-project)',
            'Projects B': 'var(--color-project)',
            'Programs': 'var(--color-program)',
            'Estimating': 'var(--color-program)',
        };

        let currentEditCancel = null;
        let dragSrcIndex = null;

        document.addEventListener('mousedown', function (e) {
            if (currentEditCancel && !e.target.closest('tr.editing')) {
                currentEditCancel();
            }
        });

        function clearDragOver () {
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        }

        function getRosterChangeStatus (personName) {
            const entries = changeLog.filter(e => e.isRosterChange && e.personName === personName);
            if (entries.length === 0) return '';
            if (entries.every(e => e.completed)) return 'completed';
            return 'proposed';
        }

        function findTeamLead (deptName) {
            return rosterData.find(r => r.dept === deptName &&
                (r.title === 'Team Lead' || r.title === 'Division Manager'));
        }

        function logRosterChange (personName, dept, changes, source) {
            changeLog.push({
                id: Date.now(),
                timestamp: new Date().toLocaleString(),
                isRosterChange: true,
                personName,
                dept,
                changes,
                source,
            });
            renderChangeLog();
            updateTotals();
        }

        function applyDrop (srcRow, targetDept, insertBefore) {
            const changes = [];
            if (srcRow.dept !== targetDept) {
                changes.push({ field: 'dept', from: srcRow.dept, to: targetDept });
                srcRow.dept = targetDept;
                const lead = findTeamLead(targetDept);
                if (lead && lead !== srcRow) {
                    changes.push({ field: 'reportsTo', from: srcRow.reportsTo, to: lead.name });
                    srcRow.reportsTo = lead.name;
                }
            }
            rosterData.splice(dragSrcIndex, 1);
            const pos = insertBefore != null
                ? rosterData.indexOf(insertBefore)
                : rosterData.reduce((acc, r, i) => r.dept === targetDept ? i + 1 : acc, 0);
            rosterData.splice(pos, 0, srcRow);
            dragSrcIndex = null;
            if (changes.length > 0) logRosterChange(srcRow.name, srcRow.dept, changes, 'Transfer');
            generateRoster(document.getElementById('roster-search').value);
        }

        function makeRosterRow (row, index) {
            const empKey = row.employment.toLowerCase();
            const tr = document.createElement('tr');
            tr.dataset.index = index;
            tr.draggable = true;

            const cells = [row.name, row.title, row.reportsTo, null, row.notes, row.area];
            cells.forEach((val, i) => {
                const td = document.createElement('td');
                if (i === 3) {
                    const badge = document.createElement('span');
                    badge.className = `badge badge-${empKey}`;
                    badge.textContent = row.employment;
                    td.appendChild(badge);
                } else {
                    td.textContent = val;
                }
                tr.appendChild(td);
            });

            const changeTd = document.createElement('td');
            const changeStatus = getRosterChangeStatus(row.name);
            if (changeStatus) {
                const badge = document.createElement('span');
                badge.className = `badge badge-${changeStatus}`;
                badge.textContent = changeStatus === 'proposed' ? 'Proposed' : 'Completed';
                changeTd.appendChild(badge);
            }
            tr.appendChild(changeTd);

            tr.addEventListener('click', () => {
                if (!tr.classList.contains('editing')) editRosterRow(tr, index);
            });

            tr.addEventListener('dragstart', (e) => {
                if (tr.classList.contains('editing')) { e.preventDefault(); return; }
                dragSrcIndex = index;
                e.dataTransfer.effectAllowed = 'move';
                setTimeout(() => tr.classList.add('dragging'), 0);
            });

            tr.addEventListener('dragend', () => {
                tr.classList.remove('dragging');
                clearDragOver();
                dragSrcIndex = null;
            });

            tr.addEventListener('dragover', (e) => {
                if (dragSrcIndex === null || dragSrcIndex === index) return;
                e.preventDefault();
                clearDragOver();
                tr.classList.add('drag-over');
            });

            tr.addEventListener('drop', (e) => {
                e.preventDefault();
                if (dragSrcIndex === null || dragSrcIndex === index) return;
                clearDragOver();
                applyDrop(rosterData[dragSrcIndex], row.dept, row);
            });

            return tr;
        }

        function deleteRosterRow (index) {
            const row = rosterData[index];
            logRosterChange(
                row.name || '(unnamed)',
                row.dept,
                [{ field: 'Action', from: 'Active', to: 'Deleted' }],
                'Deleted'
            );
            rosterData.splice(index, 1);
            generateRoster(document.getElementById('roster-search').value);
        }

        function editRosterRow (tr, index) {
            if (currentEditCancel) currentEditCancel();

            tr.classList.add('editing');
            const row = rosterData[index];
            const tds = tr.querySelectorAll('td');
            const inputs = {};

            [
                { key: 'name', tdIndex: 0 },
                { key: 'title', tdIndex: 1 },
                { key: 'reportsTo', tdIndex: 2 },
                { key: 'notes', tdIndex: 4 },
                { key: 'area', tdIndex: 5 },
            ].forEach(({ key, tdIndex }) => {
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'roster-cell-input';
                input.value = row[key];
                tds[tdIndex].textContent = '';
                tds[tdIndex].appendChild(input);
                inputs[key] = input;
            });

            const sel = document.createElement('select');
            sel.className = 'roster-cell-input';
            ['FTR', 'FTT', 'Vacancy'].forEach(opt => {
                const o = document.createElement('option');
                o.value = opt;
                o.textContent = opt;
                if (opt === row.employment) o.selected = true;
                sel.appendChild(o);
            });
            tds[3].textContent = '';
            tds[3].appendChild(sel);
            inputs.employment = sel;

            const saveBtn = document.createElement('button');
            saveBtn.type = 'button';
            saveBtn.className = 'log-action-btn';
            saveBtn.innerHTML = '✔';
            saveBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const changes = [];
                Object.keys(inputs).forEach(k => {
                    const newVal = inputs[k].value;
                    if (newVal !== String(row[k])) changes.push({ field: k, from: row[k], to: newVal });
                    rosterData[index][k] = newVal;
                });
                if (changes.length > 0) logRosterChange(rosterData[index].name, rosterData[index].dept, changes, 'Manual Edit');
                currentEditCancel = null;
                tr.replaceWith(makeRosterRow(rosterData[index], index));
            });
            tds[6].textContent = '';
            tds[6].appendChild(saveBtn);
            const delBtn = document.createElement('button');
            delBtn.type = 'button';
            delBtn.className = 'log-action-btn delete';
            delBtn.textContent = '✖';
            delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteRosterRow(index); });
            tds[6].appendChild(delBtn);

            currentEditCancel = () => {
                currentEditCancel = null;
                tr.replaceWith(makeRosterRow(rosterData[index], index));
            };

            inputs.name.focus();
        }

        function addRosterRow (dept) {
            const lead = findTeamLead(dept);
            const insertAt = rosterData.reduce((acc, r, i) => r.dept === dept ? i + 1 : acc, 0);
            rosterData.splice(insertAt, 0, {
                name: '', title: '', dept,
                reportsTo: lead ? lead.name : '',
                employment: 'FTR', notes: '', area: ''
            });
            const searchEl = document.getElementById('roster-search');
            searchEl.value = '';
            generateRoster('');
            const tr = document.getElementById('roster-tbody').querySelector(`tr[data-index="${insertAt}"]`);
            if (tr) editRosterRow(tr, insertAt);
        }

        function generateRoster (filter) {
            const tbody = document.getElementById('roster-tbody');
            tbody.innerHTML = '';
            const lc = (filter || '').toLowerCase();
            let currentDept = null;

            rosterData.forEach((row, index) => {
                if (lc && !['name', 'title', 'dept', 'reportsTo', 'employment', 'notes', 'area']
                    .some(k => (row[k] || '').toLowerCase().includes(lc))) return;

                if (row.dept !== currentDept) {
                    currentDept = row.dept;
                    const deptRow = document.createElement('tr');
                    deptRow.className = 'roster-dept-row';
                    deptRow.style.setProperty('--dept-color', deptColors[row.dept] || 'var(--text-muted)');

                    const td = document.createElement('td');
                    td.colSpan = 6;
                    td.textContent = row.dept;
                    deptRow.appendChild(td);

                    const addTd = document.createElement('td');
                    addTd.className = 'roster-add-cell';
                    const addBtn = document.createElement('button');
                    addBtn.type = 'button';
                    addBtn.className = 'roster-add-btn';
                    addBtn.textContent = '+';
                    addBtn.title = `Add person to ${row.dept}`;
                    addBtn.addEventListener('click', (e) => { e.stopPropagation(); addRosterRow(row.dept); });
                    addTd.appendChild(addBtn);
                    deptRow.appendChild(addTd);


                    const dept = row.dept;
                    deptRow.addEventListener('dragover', (e) => {
                        if (dragSrcIndex === null) return;
                        e.preventDefault();
                        clearDragOver();
                        deptRow.classList.add('drag-over');
                    });
                    deptRow.addEventListener('drop', (e) => {
                        e.preventDefault();
                        if (dragSrcIndex === null) return;
                        clearDragOver();
                        applyDrop(rosterData[dragSrcIndex], dept, null);
                    });

                    tbody.appendChild(deptRow);
                }

                tbody.appendChild(makeRosterRow(row, index));
            });
            updateTitleBreakdowns();
        }

        document.getElementById('roster-search').addEventListener('input', function () {
            generateRoster(this.value);
        });

        // Initialize totals on page load
        generateCurrentAllocation();
        generateRoster();
        updateTotals();
    </script>
