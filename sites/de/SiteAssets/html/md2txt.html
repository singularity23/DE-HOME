<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Read and Process Text Files</title>
  <style>
    .output {
      white-space: pre-wrap;
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <h1>Read and Process Text Files</h1>
  <div id="Administrative" class="output"></div>

  <script>
   // Utility: Subtract n months from YYYY-MM-DD
function subtractMonths(ymd, months) {
  const [y, m, d] = ymd.split('-').map(Number);
  const dt = new Date(y, m - 1 + months, d);
  return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
}

// Parse a Markdown bullet into structured data
function parseBullet(line) {
  const level = /^\s+\*/.test(line) ? 2 : 1; // Detect nesting level
  line = line.trim().replace(/^\*+\s*/, ''); // Remove leading asterisks

  const patterns = [
    {
      regex: /\[(.*\s?)<abbr\s+title="([^"]+)">([^<]+)<\/abbr>\]\(([^)]+)\)\s*\[!\[([^]]+)\]\(([^)]+)\)\]\(([^)]+)\)/i,
      handler: (m) => ({
        level,
        composite: `${m[1]}${m[3]}(${m[2]})`,
        type: '',
        date: '',
        url: m[4],
        logoText: m[5],
        logoSrc: m[6],
        logoLink: m[7],
      }),
    },
    {
      regex: /^\[([^\]<]+?)(?:<(?:(update|new)) date="([^"]+)"><\/\2>)?\]\(([^)]+)\)/i,
      handler: (m) => ({
        level,
        composite: m[1],
        type: m[2] ? m[2][0].toUpperCase() + m[2].slice(1).toLowerCase() : '',
        date: m[3] ? subtractMonths(m[3], -3) : '',
        url: m[4],
        logoText: '',
        logoSrc: '',
        logoLink: '',
      }),
    },
    {
      regex: /\[<abbr\s+title="([^"]+)">([^<]+)<\/abbr>\]\(([^)]+)\)/i,
      handler: (m) => ({
        level,
        composite: `${m[2]}(${m[1]})`,
        type: '',
        date: '',
        url: m[3],
        logoText: '',
        logoSrc: '',
        logoLink: '',
      }),
    },
    {
      regex: /\[(.*?\s?)<abbr\s+title="([^"]+)">([^<]+)<\/abbr>(.*?)\]\(([^)]+)\)/i,
      handler: (m) => ({
        level,
        composite: `${m[3]}(${m[2]})${m[4]}`.trim(),
        type: '',
        date: '',
        url: m[5],
        logoText: '',
        logoSrc: '',
        logoLink: '',
      }),
    },
    // Pattern for links with <abbr> and <new> or <update> tags
    {
      regex: /\[(.*?\s?)<abbr\s+title="([^"]+)">([^<]+)<\/abbr><(?:(new|update)\s+date="([^"]+)")>\]\(([^)]+)\)/i,
      handler: (m) => ({
        level,
        composite: `${m[3]}(${m[2]})`,
        type: m[4] ? m[4][0].toUpperCase() + m[4].slice(1).toLowerCase() : '',
        date: m[5] || '',
        url: m[6],
        logoText: '',
        logoSrc: '',
        logoLink: '',
      }),
    },
    // Pattern for simple links
    {
      regex: /\[([^\]]+)\]\(([^)]+)\)/i,
      handler: (m) => ({
        level,
        composite: m[1],
        type: '',
        date: '',
        url: m[2],
        logoText: '',
        logoSrc: '',
        logoLink: '',
      }),
    },
    // Pattern for links with <abbr> only
    {
      regex: /\[(.*?\s?)<abbr\s+title="([^"]+)">([^<]+)<\/abbr>\]\(([^)]+)\)/i,
      handler: (m) => ({
        level,
        composite: `${m[3]}(${m[2]})`,
        type: '',
        date: '',
        url: m[4],
        logoText: '',
        logoSrc: '',
        logoLink: '',
      }),
    },
    // Pattern for simple links
    
  ];

  for (const { regex, handler } of patterns) {
    const match = regex.exec(line);
    if (match) return handler(match);
  }

  // Default case: treat the entire line as the title
  return { level, composite: line, type: '', date: '', url: '', logoText: '', logoSrc: '', logoLink: '' };
}

// Process each .md file
async function processMarkdownFiles(mdLinks) {
  for (const mdUrl of mdLinks) {
    const name = mdUrl.split('/').pop().replace(/\.md$/, '');
    let container = document.getElementById(name);
    if (!container) {
      container = document.createElement('div');
      container.id = name;
      container.className = 'output';
      document.body.appendChild(container);
    }

    try {
      const res = await fetch(mdUrl);
      if (!res.ok) throw new Error(`Error loading ${name}.md: ${res.status}`);
      const raw = await res.text();
      const lines = raw.split(/\r?\n/);

      if (lines.length < 1) {
        container.textContent = 'Empty file';
        continue;
      }

      const out = [lines[0], '']; // Add header and blank line
      lines.slice(1).forEach((line) => {
        if (line.trim().startsWith('*')) {
          const { level, composite, type, date, url, logoText, logoSrc, logoLink } = parseBullet(line);
          out.push([level, composite, type, date, url, logoText, logoSrc, logoLink].join(', '));
        }
      });

      container.textContent = out.join('\n') + '\n';
    } catch (error) {
      container.textContent = error.message;
    }
  }
}

// Main script
(async () => {
  try {
    const listRes = await fetch('/sites/de/SiteAssets/source/');
    if (!listRes.ok) throw new Error(`Cannot fetch source folder: ${listRes.status}`);
    const listHtml = await listRes.text();
    const listDoc = new DOMParser().parseFromString(listHtml, 'text/html');
    const mdLinks = Array.from(listDoc.querySelectorAll('a'))
      .map((a) => a.href)
      .filter((href) => href.endsWith('.md'));

    await processMarkdownFiles(mdLinks);
  } catch (error) {
    console.error(error.message);
  }
})();
  </script>
</body>

</html>
