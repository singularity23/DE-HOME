<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Read and Process Text Files</title>
  <style>
    .output {
      white-space: pre-wrap;
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <h1>Read and Process Text Files</h1>
  <div id="Administrative" class="output"></div>

  <script>
    (async () => {
      // 1) Grab the folder listing
      const listRes = await fetch('/sites/de/SiteAssets/source/');
      if (!listRes.ok) {
        console.error('Cannot fetch source folder:', listRes.status);
        return;
      }
      const listHtml = await listRes.text();
      const listDoc = new DOMParser().parseFromString(listHtml, 'text/html');

      // 2) Find every .md link
      const mdLinks = Array.from(listDoc.querySelectorAll('a'))
        .map(a => a.href)
        .filter(href => href.endsWith('.md'));

      // 3) Utility: subtract n months from YYYY-MM-DD
      function subtractMonths(ymd, months) {
        const [y, m, d] = ymd.split('-').map(n => parseInt(n, 10));
        // JS Date: month is 0-based
        const dt = new Date(y, m - 1 + months, d);
        const yy = dt.getFullYear();
        const mm = String(dt.getMonth() + 1).padStart(2, '0');
        const dd = String(dt.getDate()).padStart(2, '0');
        return `${yy}-${mm}-${dd}`;
      }

      // 4) Parse one Markdown bullet â†’ [level, composite, type, dateOrig, url, logoText, logoSrc, logoLink]
      function parseBullet(line) {
        // detect nesting (any leading spaces before the star â†’ level 2, else level 1)
        const isNested = /^\s+\*/.test(line);
        const level = isNested ? 2 : 1;

        // strip all leading spaces and asterisks
        line = line.replace(/^\s*\*+\s*/, '');

        // a) Full pattern: <abbr>â€¦</abbr>optional trailing text + <update|new> tag + link + optional logo
        let re = /\[([^<\]]+?)(?:<abbr[^>]*>([^<]+)<\/abbr>(?:([^<]*?)<(new|update)\s+date="([^"]+)"[^>]*>.*?<\\(?:new|update)>)?)?\]\(([^)]+)\)(?:\s*\[\!\[([^]]+)\]\(([^)]+)\)\]\(([^)]+)\))?/i;
        let m = re.exec(line);
        console.log(m);
        if (m) {
          const [
            , code, desc, trailing,
            tagType, dateUsed, url,
            logoText = '', logoSrc = '', logoLink = ''
          ] = m;
          const dateOrig = dateUsed ? subtractMonths(dateUsed, -3) : '';
          const type = tagType ? tagType[0].toUpperCase() + tagType.slice(1).toLowerCase() : '';
          const composite = desc ? `${code}(${desc})${trailing}`.trim() : code.trim();
          return [level, composite, type, dateOrig, url, logoText, logoSrc, logoLink];
        }

        // b) Simple link with optional inline <new> or <update> in the text
        re = /^\[([^\]<]+?)(?:<(?:(update|new)) date="([^"]+)"><\/\2>)?\]\(([^)]+)\)/i;
        m = re.exec(line);
        if (m) {
          const [, rawTitle, tagType, dateUsed = '', url] = m;
          const dateOrig = dateUsed ? subtractMonths(dateUsed, -3) : '';
          const type = tagType
            ? tagType[0].toUpperCase() + tagType.slice(1).toLowerCase()
            : '';
          return [level, rawTitle.trim(), type, dateOrig, url, '', '', ''];
        }

        // c) No bracket/link at all â†’ treat the entire text as the title, no URL
        const composite = line.trim();
        return [level, composite, '', '', '', '', '', ''];
      }

      // 5) Process each .md file
      for (const mdUrl of mdLinks) {
        const name = mdUrl.split('/').pop().replace(/\.md$/, '');
        let container = document.getElementById(name);
        if (!container) {
          container = document.createElement('div');
          container.id = name;
          container.className = 'output';
          container.style.whiteSpace = 'pre-wrap';
          container.style.fontFamily = 'monospace';
          const outs = document.querySelectorAll('.output');
          if (outs.length) outs[outs.length - 1].after(container);
          else document.body.appendChild(container);
        }

        // fetch and split into lines
        const res = await fetch(mdUrl);
        if (!res.ok) {
          container.textContent = `Error loading ${name}.md: ${res.status}`;
          continue;
        }
        const raw = await res.text();
        const lines = raw.split(/\r?\n/);

        if (lines.length < 1) {
          container.textContent = 'Empty file';
          continue;
        }

        // 6) Build the TXT feed
        const out = [];
        out.push(lines[0]);  // HEAD
        out.push('');        // blank line

        lines.slice(1).forEach(line => {
          if (line.trim().startsWith('*')) {
            const [lvl, comp, type, date, url, lt, ls, ll] = parseBullet(line);
            // assemble CSV, ensuring 8 fields
            out.push([
              lvl,
              comp,
              type,
              date,
              url,
              lt,
              ls,
              ll
            ].join(', '));
          }
        });

        // 7) Inject back into the DIV
        container.textContent = out.join('\n') + '\n';
      }
    })();
  </script>
</body>

</html>
