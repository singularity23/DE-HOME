<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIBRA Rollout Form</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wdth,wght@0,75..100,100..900;1,75..100,100..900&display=swap"
        rel="stylesheet">

    <style>
        /* ============================================================
        LIBRA ROLLOUT FORM
        Aligned with StudioBlank design system — minimal, flat, accessible
        ============================================================ */

        /* --------------------------------
        1. CSS Custom Properties (Variables)
        -------------------------------- */
        :root {
            /* Color palette */
            --color-primary: rgb(50, 50, 50);
            --color-secondary: rgb(250, 250, 250);
            --color-tertiary: #d4d4d8;
            --surface-base: rgb(250, 250, 250);
            --surface-inverse: #231f20;
            --color-success: #046a38;
            --color-error: #fa4616;
            --color-info: rgb(113, 113, 122);
            --color-link: #0074a4;

            /* Semantic color assignments */
            --header-bg: color-mix(in srgb, var(--color-secondary) 80%, var(--color-tertiary));
            --surface: #ffffff;
            --border: color-mix(in srgb, var(--color-info) 50%, var(--surface-base));
            --border-hard: var(--color-tertiary);
            --border-soft: var(--color-tertiary);
            --text: color-mix(in srgb, var(--color-primary) 80%, var(--surface-base));
            --text-muted: var(--color-info);
            --muted: color-mix(in srgb, var(--color-tertiary) 10%, var(--surface));
            --accent: var(--color-primary);
            --error: color-mix(in srgb, var(--color-error) 50%, var(--surface-inverse));
            --error-bg: color-mix(in srgb, var(--color-error) 10%, var(--surface-base));
            --error-border: var(--color-error);
            --success: var(--color-success);
            --bg: var(--color-secondary);

            /* Spacing scale */
            --space-base: 16px;
            --space-page-y: var(--space-base);
            --space-page-x: var(--space-base);
            --space-page-bottom: 32px;
            --space-inset-y: 10px;
            --space-inset-x: 15px;
            --gap-xs: 4px;
            --gap-sm: 8px;
            --gap-md: 10px;
            --gap-lg: 12px;
            --touch-min: 36px;

            /* Borders */
            --radius: 0;
            --radius-sm: 0;

            /* Typography */
            --font-sans: 'Roboto', system-ui, sans-serif;
            --font-size-base: 16px;
            --font-size-sm: 0.875rem;
            --font-size-xs: 0.75rem;
            --line-height-base: 1.5;
            --line-height-tight: 1.2;
        }

        /* --------------------------------
        2. Base & Reset
        -------------------------------- */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', system-ui, sans-serif;
            font-weight: 400;
            font-size: 16px;
            line-height: 1.5;
            color: var(--text);
            min-height: 50vh;
            padding: var(--space-page-y) var(--space-page-x) var(--space-page-bottom);
            max-width: 816px;
            margin: 0 auto;
            background: var(--bg);
        }

        /* Focus styles */
        :focus-visible {
            outline: 1px solid var(--color-link) !important;
            outline-offset: 0px !important;
        }

        /* --------------------------------
        3. Layout
        -------------------------------- */
        .shell {
            max-width: 860px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 600;
            color: #0074a4;
            margin-bottom: var(--gap-lg);
        }

        .header p {
            font-size: var(--font-size-sm);
            color: var(--text-muted);
            margin: 0;
            display: none;
        }

        /* Error/Success Messages */
        .error-message {
            display: none;
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            border-radius: var(--radius);
            padding: var(--space-inset-y) var(--space-inset-x);
            color: var(--error);
            margin-bottom: var(--space-base);
            font-size: var(--font-size-sm);
        }

        .error-message.show {
            display: block;
        }

        /* Principles Grid */
        .principles-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: var(--gap-lg);
            margin-bottom: 2rem;
        }

        .principle-card:nth-child(1) {
            grid-column: 1;
            grid-row: 1;
        }

        .principle-card:nth-child(2) {
            grid-column: 2 / 4;
            grid-row: 1;
        }

        .principle-card:nth-child(3) {
            grid-column: 1;
            grid-row: 2;
        }

        .principle-card:nth-child(4) {
            grid-column: 2;
            grid-row: 2;
        }

        .principle-card:nth-child(5) {
            grid-column: 3;
            grid-row: 2;
        }

        .principle-card {
            background: var(--surface);
            border: 1px solid var(--border-hard);
            border-top: 4px solid;
            border-radius: var(--radius);
            padding: var(--space-base);
            cursor: text;
            transition: border-color 0.2s ease, background-color 0.2s ease;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .principle-card:nth-child(1) {
            grid-column: 1;
            grid-row: 1;
            border-top-color: #fa4616;
        }

        .principle-card:nth-child(2) {
            grid-column: 2 / 4;
            grid-row: 1;
            border-top-color: #046a38;
        }

        .principle-card:nth-child(3) {
            grid-column: 1;
            grid-row: 2;
            border-top-color: #d4d4d8;
        }

        .principle-card:nth-child(4) {
            grid-column: 2;
            grid-row: 2;
            border-top-color: #ffb656;
        }

        .principle-card:nth-child(5) {
            grid-column: 3;
            grid-row: 2;
            border-top-color: #0074a4;
        }

        .principle-card.selected {
            background: var(--header-bg);
            border-color: var(--text-muted);
        }

        .principle-label {
            font-size: var(--font-size-xs);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #0074a4;
            margin-bottom: 1rem;
            display: block;
            border-bottom: 1px solid var(--border-hard);
            padding-bottom: var(--gap-md);
        }

        .principle-textarea {
            width: 100%;
            min-height: 120px;
            padding: var(--space-inset-y) var(--space-inset-x);
            border: 1px solid var(--border-hard);
            border-radius: var(--radius);
            font-size: 14px;
            font-family: var(--font-sans);
            resize: vertical;
            margin-top: var(--gap-md);
            transition: border-color 0.2s ease;
            color: #999;
            background: #fafafa;
        }

        .principle-textarea::placeholder {
            color: #999;
        }

        .principle-textarea:focus {
            outline: none;
            border-color: var(--color-link);
            background: var(--surface);
            color: var(--text);
        }

        /* Form Section */
        .form-section {
            background: #f5f5f5;
            border: 1px solid var(--border-hard);
            border-radius: var(--radius);
            padding: var(--space-base);
            margin-bottom: 2rem;
            margin-top: 2rem;
        }

        .form-section h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: var(--space-base);
            color: var(--text);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--gap-lg);
            margin-bottom: var(--space-base);
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: var(--gap-md);
            color: var(--text);
        }

        .form-group input,
        .form-group textarea {
            padding: 10px 12px;
            border: 1px solid var(--border-hard);
            border-radius: var(--radius);
            font-size: 14px;
            font-family: var(--font-sans);
            transition: border-color 0.2s ease;
            color: #999;
            background: var(--surface);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #999;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--color-link);
            color: var(--text);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group:nth-child(3) {
            grid-column: 1 / -1;
        }

        /* Checkbox with Label */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: var(--gap-sm);
            cursor: pointer;
            margin-bottom: var(--space-base);
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--text);
        }

        .checkbox-group label {
            font-size: var(--font-size-base);
            color: var(--text);
            cursor: pointer;
            margin: 0;
        }

        /* Buttons */
        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-base);
            padding: var(--space-base) 0;
        }

        button {
            background: var(--surface);
            border: 1px solid var(--border-hard);
            color: var(--text);
            padding: 12px 40px;
            font-size: var(--font-size-base);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: var(--font-sans);
            border-radius: var(--radius);
            min-width: 200px;
        }

        button:hover {
            background: #f5f5f5;
            border-color: var(--text);
        }

        button:active {
            opacity: 0.9;
        }

        .counter {
            font-size: var(--font-size-xs);
            color: var(--text-muted);
        }

        /* Success Message */
        .success-message {
            display: none;
            background: color-mix(in srgb, var(--color-success) 14%, var(--surface-base));
            border: 1px solid var(--color-success);
            border-radius: var(--radius);
            padding: var(--space-inset-y) var(--space-inset-x);
            margin-top: var(--space-base);
            color: var(--color-success);
            text-align: center;
            font-size: var(--font-size-sm);
        }

        .success-message.show {
            display: block;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .principles-grid {
                grid-template-columns: 1fr 1fr 1fr;
            }

            .principle-card:nth-child(2) {
                grid-column: 2 / 4;
                grid-row: 1;
            }

            .principle-card:nth-child(3) {
                grid-column: 1;
                grid-row: 2;
            }

            .principle-card:nth-child(4) {
                grid-column: 2;
                grid-row: 2;
            }

            .principle-card:nth-child(5) {
                grid-column: 3;
                grid-row: 2;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: var(--space-page-y) var(--gap-lg) var(--space-page-bottom);
            }

            .header h1 {
                font-size: 1.75rem;
            }

            .principles-grid {
                grid-template-columns: 1fr;
            }

            .principle-card:nth-child(1),
            .principle-card:nth-child(2),
            .principle-card:nth-child(3),
            .principle-card:nth-child(4),
            .principle-card:nth-child(5) {
                grid-column: 1;
                grid-row: auto;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="shell">
        <!-- Header -->
        <div class="header">
            <h1>Lead Our Way Forward</h1>
            <span>LIBRA TOOL</span>
        </div>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage"></div>

        <!-- Principles Grid -->
        <div class="principles-grid">
            <!-- Live It Daily -->
            <div class="principle-card live-daily" data-value="live-daily">
                <div class="principle-label">Live it daily</div>
                <textarea class="principle-textarea" placeholder="How will you live this principle daily?"
                    data-principle="live-daily"></textarea>
            </div>

            <!-- Invite Others -->
            <div class="principle-card invite-others" data-value="invite-others">
                <div class="principle-label">Invite others</div>
                <textarea class="principle-textarea" placeholder="How will you invite others into this work?"
                    data-principle="invite-others"></textarea>
            </div>

            <!-- Connect to Big Picture -->
            <div class="principle-card connect" data-value="connect-big-picture">
                <div class="principle-label">Connect</div>
                <textarea class="principle-textarea" placeholder="How will you connect this to the big picture?"
                    data-principle="connect-big-picture"></textarea>
            </div>

            <!-- Raise Awareness -->
            <div class="principle-card awareness" data-value="raise-awareness">
                <div class="principle-label">Raise awareness</div>
                <textarea class="principle-textarea" placeholder="How will you raise awareness?"
                    data-principle="raise-awareness"></textarea>
            </div>

            <!-- Take Smart Action -->
            <div class="principle-card smart-action" data-value="take-action">
                <div class="principle-label">Take smart action</div>
                <textarea class="principle-textarea" placeholder="What smart actions will you take?"
                    data-principle="take-action"></textarea>
            </div>
        </div>

        <!-- Form Section -->
        <div class="form-section">
            <div class="form-group">
                <label for="goal">Primary implementation goal</label>
                <textarea id="goal" placeholder="What do you want to achieve with this rollout?"></textarea>
            </div>

        </div>

    </div>

    <script>
        // Initialize event listeners
        function init () {
            const principleTextareas = document.querySelectorAll('.principle-textarea');

            // Textarea change handler to highlight cards with content
            principleTextareas.forEach(textarea => {
                textarea.addEventListener('input', function () {
                    const card = this.closest('.principle-card');
                    if (this.value.trim()) {
                        card.classList.add('selected');
                    } else {
                        card.classList.remove('selected');
                    }
                    updateSelectedCount();
                });
            });
        }

        function updateSelectedCount () {
            const filled = Array.from(document.querySelectorAll('.principle-textarea')).filter(ta => ta.value.trim()).length;
            document.getElementById('selectedCount').textContent = filled;
        }

        function submitForm () {
            // Clear any previous messages
            hideErrorMessage();
            hideSuccessMessage();

            // Get form data
            const principleInputs = {};
            document.querySelectorAll('.principle-textarea').forEach(textarea => {
                const principle = textarea.getAttribute('data-principle');
                principleInputs[principle] = textarea.value.trim();
            });

            const teamName = document.getElementById('teamName').value.trim();
            const department = document.getElementById('department').value.trim();
            const goal = document.getElementById('goal').value.trim();
            const notify = document.getElementById('notify').checked;

            // Validation
            if (!teamName) {
                showErrorMessage('Please enter your team name');
                return;
            }

            if (!department) {
                showErrorMessage('Please enter your department');
                return;
            }

            if (!goal) {
                showErrorMessage('Please describe your primary implementation goal');
                return;
            }

            const filledPrinciples = Object.values(principleInputs).filter(v => v).length;
            if (filledPrinciples === 0) {
                showErrorMessage('Please fill in at least one principle textarea');
                return;
            }

            // Prepare submission data
            const formData = {
                teamName: teamName,
                department: department,
                primaryGoal: goal,
                principles: principleInputs,
                notificationOptIn: notify,
                submittedAt: new Date().toLocaleString()
            };

            // Log to console (in a real application, this would be sent to a server)
            console.log('LIBRA Rollout Form Submission:', formData);

            // Show success message
            showSuccessMessage();

            // Reset form after 2 seconds
            setTimeout(() => {
                resetForm();
            }, 2000);
        }

        function showErrorMessage (message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = '⚠ ' + message;
            errorDiv.classList.add('show');
        }

        function hideErrorMessage () {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.classList.remove('show');
        }

        function showSuccessMessage () {
            const successDiv = document.getElementById('successMessage');
            successDiv.classList.add('show');
        }

        function hideSuccessMessage () {
            const successDiv = document.getElementById('successMessage');
            successDiv.classList.remove('show');
        }

        function resetForm () {
            // Reset form inputs
            document.getElementById('teamName').value = '';
            document.getElementById('department').value = '';
            document.getElementById('goal').value = '';
            document.getElementById('notify').checked = false;

            // Reset textareas and cards
            document.querySelectorAll('.principle-textarea').forEach(textarea => {
                textarea.value = '';
                const card = textarea.closest('.principle-card');
                card.classList.remove('selected');
            });

            updateSelectedCount();
            hideSuccessMessage();
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
