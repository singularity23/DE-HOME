<!DOCTYPE html>
<html lang="en">

<head>
  <title>lazy-brush Basic Example</title>
  <style>
    body {
      margin: 0;
    }

    canvas {
      display: block;
      cursor: crosshair;
    }
  </style>
</head>

<body>
  <div id="app">
    <canvas id="canvas" width="1024" height="768"></canvas>
  </div>

  <script type="module">
    import { LazyBrush } from 'https://cdn.jsdelivr.net/npm/lazy-brush@2.0.0/lib/lazy-brush.js'

    // The lazy radius.
    const LAZY_RADIUS = 10
    const BRUSH_RADIUS = 5

    // Create new LazyBrush instance.
    const lazy = new LazyBrush({
      enabled: true,
      radius: LAZY_RADIUS
    })
    const canvas = document.getElementById('canvas')
    const ctx = canvas.getContext('2d')
    ctx.strokeStyle = 'black'
    canvas.width = window.innerWidth
    canvas.height = window.innerHeight

    let lastX, lastY;
    canvas.addEventListener('mousedown', function (e) {
      const x = e.clientX
      const y = e.clientY
      lazy.update({ x, y })
      lastX = x;
      lastY = y;
    })

    function drawLine (lastX, lastY, midX, midY) {
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(midX, midY);
      ctx.stroke();

    }
    // While not always reccommended, we can directly draw in your event
    // handler here. Generally it is better to do that in an animation loop.
    // See the "friction.html" example on how to do that.
    canvas.addEventListener('mousemove', function (e) {
      const x = e.clientX
      const y = e.clientY
      lazy.update({ x, y })

      const brushHasMoved = lazy.brushHasMoved()

      // We only need to update the canvas if the brush has moved.
      if (brushHasMoved) {
        // Get the updated brush coordinates.
        const brush = lazy.getBrushCoordinates()

        // Draw the canvas.

        // Clear entire canvaas.
        ctx.clearRect(0, 0, canvas.width, canvas.height)

        // Draw brush point
        ctx.beginPath()
        ctx.fillStyle = 'red'
        ctx.arc(brush.x, brush.y, BRUSH_RADIUS, 0, Math.PI * 2, true)
        ctx.fill()

        // Draw the lazy radius.
        ctx.beginPath()
        ctx.strokeStyle = '#ccc'
        ctx.arc(brush.x, brush.y, LAZY_RADIUS, 0, Math.PI * 2, true)
        ctx.stroke()

        // Update lazy brush with optional friction for smoother trailing[reference:4].
        // Friction of 0.3 gives a subtle dampening effect.

        // Check if brush actually moved
        if (lazy.brushHasMoved()) {
          // Draw a line from last brush position to current
          drawLine(lastX, lastY, brush.x, brush.y);
          lastX = brush.x;
          lastY = brush.y;
        }

      }
    })
  </script>
</body>

</html>
